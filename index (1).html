<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Proposal for You 💍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Elegant Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #2d1f3b, #1a1a2e, #16213e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    text-align: center;
    color: #fff;
    cursor: none; /* Hide default cursor for custom effect */
}

/* Custom Ring Cursor */
.cursor {
    position: fixed;
    font-size: 35px; /* Slightly larger cursor */
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
}

/* Ambient Glow Background */
body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle, rgba(255, 107, 107, 0.1) 0%, rgba(0,0,0,0) 60%);
    transform: translate(-50%, -50%);
    z-index: -1;
    animation: pulseGlow 4s infinite alternate;
}

@keyframes pulseGlow {
    0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}

/* Floating Hearts Background */
.hearts-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.15);
    animation: floatUp linear infinite;
    user-select: none;
    text-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
}

@keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
}

.container {
    background: rgba(255, 255, 255, 0.98);
    padding: 60px 50px; /* Increased padding */
    border-radius: 30px;
    box-shadow: 
        0 20px 50px rgba(0,0,0,0.5), 
        0 0 100px rgba(255, 107, 107, 0.15),
        inset 0 0 20px rgba(255, 255, 255, 0.5);
    
    /* SCALED UP SIZE */
    max-width: 650px; /* Increased from 480px */
    width: 90%;
    
    border: 1px solid rgba(255, 215, 0, 0.2);
    position: relative;
    z-index: 10;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease;
}

.container:hover {
    transform: scale(1.01);
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 52px; /* Increased from 42px */
    background: linear-gradient(45deg, #ff6b6b, #d62839, #ff8e53);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
    line-height: 1.3;
    text-shadow: 0px 5px 15px rgba(214, 40, 57, 0.2);
    animation: titleGlow 2s infinite alternate;
}

@keyframes titleGlow {
    from { filter: drop-shadow(0 0 5px rgba(255, 107, 107, 0.3)); }
    to { filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.6)); }
}

p {
    color: #666;
    font-size: 20px; /* Increased from 17px */
    margin-bottom: 40px;
    line-height: 1.6;
    font-weight: 400;
}

.buttons {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 30px; /* Increased gap */
    position: relative;
    min-height: 70px;
}

button {
    padding: 20px 50px; /* Increased padding for bigger buttons */
    font-size: 20px; /* Increased font size */
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
}

button::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

button:hover::after {
    left: 100%;
}

#yesBtn {
    background: linear-gradient(45deg, #ff6b6b, #d62839);
    color: white;
    box-shadow: 0 8px 25px rgba(214, 40, 57, 0.4);
}

#yesBtn:hover {
    transform: scale(1.1) translateY(-3px);
    box-shadow: 0 15px 30px rgba(214, 40, 57, 0.5);
}

#noBtn {
    background: #e0e0e0;
    color: #666;
    transition: all 0.2s ease;
    min-width: 160px; /* Wider minimum width */
}

#message {
    margin-top: 40px;
    font-weight: 600;
    color: #d62839;
    min-height: 30px;
    font-size: 22px; /* Increased font size */
}

.success {
    font-size: 26px; /* Increased success message */
    color: #4CAF50;
    font-family: 'Poppins', sans-serif;
    animation: bounceIn 0.6s;
}

@keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
}

@media (max-width: 600px) {
    /* Adjustments for smaller phones if the box gets too big */
    h1 { font-size: 38px; }
    .container { padding: 40px 30px; max-width: 95%; }
    button { padding: 16px 35px; font-size: 17px; }
    p { font-size: 18px; }
}

</style>
</head>

<body>

<!-- Custom Cursor Element -->
<div class="cursor" id="cursor">💍</div>

<div class="hearts-bg" id="heartsContainer"></div>

<div class="container">

<h1 id="question">
Will you be my girlfriend? 
</h1>

<p id="subtext">I have something important to ask you.<br>
From the moment I met you,<br>
you made my days brighter<br>
and my smile bigger.</p>

<div class="buttons">

<button id="yesBtn">
Yes, I Will!💍
</button>

<button id="noBtn">
No, I Can't...😢
</button>

</div>

<p id="message"></p>

</div>

<footer style="position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 14px; color: rgba(255,255,255,0.5); z-index: 10;">
Made by CutieDevu❤ | <a href="https://instagram.com/koolutai" target="_blank" style="color: rgba(255,255,255,0.5); text-decoration: none;">Instagram</a>
</footer>

<script>

// --- Custom Cursor Logic ---
const cursor = document.getElementById("cursor");
document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

// Sparkle effect on click anywhere
document.addEventListener('click', (e) => {
    createSparkle(e.clientX, e.clientY);
});

function createSparkle(x, y) {
    const sparkle = document.createElement('div');
    sparkle.innerHTML = "✨";
    sparkle.style.position = 'fixed';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.pointerEvents = 'none';
    sparkle.style.zIndex = '9998';
    sparkle.style.fontSize = '20px';
    sparkle.style.transition = 'all 0.5s ease-out';
    sparkle.style.transform = 'translate(-50%, -50%) scale(0)';
    document.body.appendChild(sparkle);
    
    setTimeout(() => {
        sparkle.style.transform = 'translate(-50%, -50%) scale(1.5)';
        sparkle.style.opacity = '0';
    }, 10);

    setTimeout(() => {
        sparkle.remove();
    }, 500);
}

// --- Generate Background Hearts ---
const heartsContainer = document.getElementById("heartsContainer");
const heartColors = ['❤', '💕', '💖', '💗', '💓', '💘'];

for(let i=0; i<25; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = heartColors[Math.floor(Math.random() * heartColors.length)];
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 15 + 10) + "s";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.opacity = Math.random() * 0.5 + 0.1;
    heartsContainer.appendChild(heart);
}

// --- Dramatic messages ---
const messages = [
"Are you sure, my love? 😢",
"Don't break my heart... 💔",
"Think of our memories 🥺",
"Please, reconsider? 😢",
"I can't live without you 😭",
"You are my everything 🌹",
"Is this the end? 😭",
"One more chance? 🙏"
];

let messageIndex = 0;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const messageText = document.getElementById("message");
const subtext = document.getElementById("subtext");

// --- Move NO button logic (Simple Teleport Style) ---
noBtn.addEventListener("mouseover", () => {
    // This logic matches the simple random movement you requested
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    // Apply fixed position to move it anywhere on screen
    noBtn.style.position = 'fixed'; 
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    messageText.textContent = messages[messageIndex % messages.length];
    messageIndex++;
});

// --- YES button celebration ---
yesBtn.addEventListener("click", () => {
    
    // Discord Integration
    const webhookURL = 'https://discord.com/api/webhooks/1485728567911387313/6ZkXasR86Ybp9iOCdZjLexI1jI5DpHs1qFKSxxEyfPY78bOAvcB7BtvscufwsFcC4G3g'; 
    
    const message = {
        content: "🎉 **She accepted your proposal!** 💍\nShe clicked the 'Yes' button!😂 Congratulations!❤"
    };

    if (webhookURL) {
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(message)
        }).catch(error => console.error("Webhook error:", error));
    }

    document.getElementById("question").textContent = "She said YES! 💍";
    subtext.innerHTML = "You have made me the happiest person alive.<br>I love you forever! ❤️";
    
    messageText.innerHTML = "<span class='success'>Forever and Always ❤️</span>";

    noBtn.style.display = "none";
    yesBtn.style.display = "none";
    
    cursor.style.display = "none";

    // Confetti Explosion
    const duration = 5 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    const interval = setInterval(function() {
      const timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      const particleCount = 50 * (timeLeft / duration);
      
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
});

</script>

</body>
</html>
